image:
  repository: valkey/valkey
  tag: "8.0.1-alpine"
  pullPolicy: IfNotPresent

# 3 primary + 3 secondary nodes total = 6. Both counts must match for the
# bootstrap Job to pair them one-to-one.
replicaCount: 3

auth:
  enabled: true
  password: valkey-cluster-pwd     # used by both primaries and secondaries

ports:
  client: 6379
  bus: 16379

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

storage:
  size: 1Gi
  storageClassName: ""

# External access — one LoadBalancer Service per pod, port-separated, fronted
# by the keepalived VIP on the k3s cluster. Per-shard addressability is
# non-negotiable (a MOVED redirect must land on exactly ONE node), and here it
# comes from the PORT: primary-0 on basePorts.client+0, primary-1 on +1, ...
# secondary-2 on +5. All six share one address — the VIP, reached by HOSTNAME.
#
# How the pieces fit on k3s:
#   - klipper (servicelb) fulfills each type:LoadBalancer Service: it
#     hostPort-binds the Service's port on every node and forwards to the pod.
#   - keepalived floats ONE VIP across the nodes → a single stable address.
#   - dnsmasq resolves announceHostname → that VIP (for the Mac AND, via a
#     CoreDNS stub, for pods).
#   - Valkey announces the HOSTNAME (cluster-preferred-endpoint-type hostname),
#     so CLUSTER SHARDS / CLUSTER NODES / MOVED return
#     valkey.debug-demo.local:<port> — names, never IPs. A client resolves the
#     name → VIP and dials the port; klipper routes it to the owning pod.
#
# The cluster BUS (gossip) is NOT exposed here: pods announce their pod IP +
# container bus port and reach each other's bus directly on the CNI network.
# So there is no gossip hairpin through the VIP and no shim — the thing the old
# Rancher-Desktop setup needed is simply gone.
loadBalancer:
  enabled: true
  # Each pod announces the SHARED VIP (an IP, required for the cluster bus)
  # plus a UNIQUE port. announceIP is the keepalived VIP — set by k3s-charts.sh
  # to K3S_VIP. It must be an IP; the client-facing HOSTNAME is announced
  # separately (announceHostname + cluster-preferred-endpoint-type hostname in
  # the configmap), so CLUSTER SHARDS/MOVED return the name while the cluster
  # bus and intra-cluster connections use VIP:port.
  #
  # Why the VIP (not the pod IP) is the announce IP: intra-cluster connections
  # (a replica syncing from its master, MIGRATE, etc.) dial announceIP:
  # announcePort. With port separation the pod listens on ports.client (6379)
  # but announces 6380 — so the address MUST remap the port, which klipper does
  # (VIP:6380 → pod:6379). Announcing the pod IP would send those to
  # pod-ip:6380 where nothing listens, and replicas could never join. On k3s
  # the VIP is directly reachable from pods (shared L2), so gossip flows through
  # it with no shim — the thing Rancher Desktop needed is simply gone.
  announceIP: ""                 # set to the VIP by k3s-charts.sh
  announceHostname: "valkey.debug-demo.local"
  basePorts:
    client: 6379           # primary-0 → 6379, primary-1 → 6380, ... secondary-2 → 6384
    bus: 16379             # bus = client + 10000, same +idx offsets

config:
  # Extra raw lines appended to valkey.conf. Useful for tuning maxmemory etc.
  # enable-debug-command local: DEBUG (notably DEBUG SLEEP) is allowed from
  # connections originating inside the pod only (kubectl exec + valkey-cli to
  # 127.0.0.1). scripts/valkey-cluster-tests.sh and scripts/chaos.sh use
  # DEBUG SLEEP to freeze a primary's event loop — the only deterministic way
  # to trigger real failure detection + replica election here (a deleted pod
  # is resurrected by the StatefulSet faster than the 5s node-timeout).
  # This app is a debugging target; don't carry this setting to real prod.
  extra: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    enable-debug-command local
