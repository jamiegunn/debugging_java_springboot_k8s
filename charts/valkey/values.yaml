image:
  repository: valkey/valkey
  tag: "8.0.1-alpine"
  pullPolicy: IfNotPresent

# 3 primary + 3 secondary nodes total = 6. Both counts must match for the
# bootstrap Job to pair them one-to-one.
replicaCount: 3

auth:
  enabled: true
  password: valkey-cluster-pwd     # used by both primaries and secondaries

ports:
  client: 6379
  bus: 16379

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

storage:
  size: 1Gi
  storageClassName: ""

# External access via MetalLB — one LoadBalancer Service per pod. MOVED
# redirects from CLUSTER SHARDS / CLUSTER NODES must resolve to externally-
# reachable per-shard endpoints, so each pod announces its own external
# address via cluster-announce-{ip,port,bus-port}.
#
# Two ways to shape those endpoints:
#
#   sharedIP-perPort (default) — ONE LoadBalancer IP shared by all 6
#     Services (MetalLB `allow-shared-ip`); each node is distinguished by
#     a unique EXTERNAL port: basePorts.client+idx / basePorts.bus+idx,
#     where idx = ordinal for primaries and ordinal+replicaCount for
#     secondaries. Matches enterprise "one VIP per app" allocation — the
#     same shape as an F5 VIP with port-based pool members. Pods still
#     listen on ports.client/ports.bus internally; only the Service port
#     and the announce values differ per pod.
#     NOTE: this mode uses externalTrafficPolicy: Cluster. MetalLB only
#     lets Local-policy Services share an IP when their pod selectors are
#     identical, and ours select one pod each — Local + shared IP is
#     rejected by the controller.
#
#   perPodIP (legacy) — one pinned LoadBalancer IP per pod, every node on
#     the same port. Needs 6 IPs from the pool + 6 host routes in dev.
loadBalancer:
  enabled: true
  pool: bridge-pool        # MetalLB IPAddressPool name (annotation)
  mode: sharedIP-perPort   # sharedIP-perPort | perPodIP
  # --- sharedIP-perPort mode ---
  sharedIP: "192.168.64.51"
  basePorts:
    client: 6379           # primary-0 ext 6379, primary-1 6380, ... secondary-2 6384
    bus: 16379             # same +idx offsets as client
  # --- perPodIP mode (legacy) ---
  # IPs are assigned by ordinal: primaryIPs[0] -> valkey-primary-0, etc.
  # Lists must be exactly `replicaCount` long.
  primaryIPs:
    - "192.168.64.51"
    - "192.168.64.52"
    - "192.168.64.53"
  secondaryIPs:
    - "192.168.64.54"
    - "192.168.64.55"
    - "192.168.64.56"

config:
  # Extra raw lines appended to valkey.conf. Useful for tuning maxmemory etc.
  extra: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
