image:
  repository: valkey/valkey
  tag: "8.0.1-alpine"
  pullPolicy: IfNotPresent

# 3 primary + 3 secondary nodes total = 6. Both counts must match for the
# bootstrap Job to pair them one-to-one.
replicaCount: 3

auth:
  enabled: true
  password: valkey-cluster-pwd     # used by both primaries and secondaries

ports:
  client: 6379
  bus: 16379

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

storage:
  size: 1Gi
  storageClassName: ""

# External access — one LoadBalancer Service per pod, port-separated, fronted
# by the keepalived VIP on the k3s cluster. Per-shard addressability is
# non-negotiable (a MOVED redirect must land on exactly ONE node), and here it
# comes from the PORT: primary-0 on basePorts.client+0, primary-1 on +1, ...
# secondary-2 on +5. All six share one address — the VIP, reached by HOSTNAME.
#
# How the pieces fit on k3s:
#   - MetalLB (L2/ARP mode; k3s servicelb/klipper is disabled) fulfills each
#     type:LoadBalancer Service: it assigns each Service its OWN real IP from a
#     pool and announces it via ARP from the agents only. No shared-IP
#     annotations, no per-pod IPs — one pool IP per shard.
#   - keepalived floats ONE VIP on the ddk3s-lb VM → a single stable address;
#     HAProxy maps VIP:port → that shard's MetalLB IP.
#   - dnsmasq resolves announceHostname → that VIP (for the Mac AND, via a
#     CoreDNS stub, for pods).
#   - Valkey announces the HOSTNAME (cluster-preferred-endpoint-type hostname),
#     so CLUSTER SHARDS / CLUSTER NODES / MOVED return
#     valkey.debug-demo.local:<port> — names, never IPs. A client resolves the
#     name → VIP; HAProxy routes the port to that shard's MetalLB IP → the
#     owning pod.
#
# The cluster BUS (gossip) is NOT exposed here: pods announce their pod IP +
# container bus port and reach each other's bus directly on the CNI network.
# So there is no gossip hairpin through the VIP and no proxy/shim in the bus path.
loadBalancer:
  enabled: true
  # Each pod LISTENS on its own unique port (basePorts.client + idx) and its own
  # bus port (basePorts.bus + idx), and announces its POD IP + those ports. So
  # the cluster bus and replication are DIRECT pod-to-pod on the CNI network —
  # no VIP, no HAProxy, no MetalLB, no shim in the gossip path (that's what makes
  # replica joins reliable). CLIENTS get the hostname below (cluster-preferred-
  # endpoint-type hostname), which resolves to the keepalived VIP and, on the
  # announced port, is routed by HAProxy to that shard's MetalLB IP → the owning
  # pod (Service targetPort = the pod's unique port, so no remap is needed).
  #
  # announceHostname must resolve to the VIP from BOTH the Mac (/etc/resolver)
  # and pods (CoreDNS). No announceIP is needed — the announce IP is the pod IP.
  announceHostname: "valkey.debug-demo.local"
  basePorts:
    client: 6379           # primary-0 → 6379, primary-1 → 6380, ... secondary-2 → 6384
    bus: 16379             # bus = client base; node idx N listens on 16379+N

config:
  # Extra raw lines appended to valkey.conf. Useful for tuning maxmemory etc.
  # enable-debug-command local: DEBUG (notably DEBUG SLEEP) is allowed from
  # connections originating inside the pod only (kubectl exec + valkey-cli to
  # 127.0.0.1). scripts/valkey-cluster-tests.sh and scripts/chaos.sh use
  # DEBUG SLEEP to freeze a primary's event loop — the only deterministic way
  # to trigger real failure detection + replica election here (a deleted pod
  # is resurrected by the StatefulSet faster than the 5s node-timeout).
  # This app is a debugging target; don't carry this setting to real prod.
  extra: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    enable-debug-command local
