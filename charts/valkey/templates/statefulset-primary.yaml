apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-primary
  labels: {{- include "valkey.labels" . | nindent 4 }}
spec:
  serviceName: valkey-primary-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel    # all primaries can start together; we don't need ordered boot
  selector:
    matchLabels: {{- include "valkey.primarySelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey.primarySelector" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -oE '[0-9]+$')
              # Each pod LISTENS on its own unique port (base+idx client,
              # busbase+idx bus) and announces its POD IP + those ports. So the
              # cluster bus and replication are DIRECT pod-to-pod on the CNI
              # network — the VIP and klipper are out of the gossip path
              # entirely (that's what made replica joins hang before). Clients
              # still get valkey.debug-demo.local:<port> (hostname from
              # valkey.conf); that resolves to the VIP → klipper → this pod,
              # whose Service targetPort is this same unique port.
              {{- if .Values.loadBalancer.enabled }}
              IDX=$((ORDINAL + ORDINAL_OFFSET))
              LISTEN_PORT=$((BASE_CLIENT_PORT + IDX))
              CLUSTER_PORT=$((BASE_BUS_PORT + IDX))
              {{- else }}
              LISTEN_PORT={{ .Values.ports.client }}
              CLUSTER_PORT={{ .Values.ports.bus }}
              {{- end }}
              echo "$LISTEN_PORT" > /tmp/valkey-port   # the probes read this
              echo "valkey-primary-${ORDINAL}: listen ${LISTEN_PORT}/${CLUSTER_PORT}, announce ${POD_IP}"
              exec valkey-server /etc/valkey/valkey.conf \
                --port "$LISTEN_PORT" \
                --cluster-port "$CLUSTER_PORT" \
                --cluster-announce-ip "$POD_IP" \
                --cluster-announce-port "$LISTEN_PORT" \
                --cluster-announce-bus-port "$CLUSTER_PORT"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .Values.loadBalancer.enabled }}
            - name: BASE_CLIENT_PORT
              value: {{ .Values.loadBalancer.basePorts.client | quote }}
            - name: BASE_BUS_PORT
              value: {{ .Values.loadBalancer.basePorts.bus | quote }}
            - name: ORDINAL_OFFSET
              value: "0"      # primaries occupy idx 0..replicaCount-1
            {{- end }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  valkey-cli -p "$(cat /tmp/valkey-port)" {{ if .Values.auth.enabled }}-a "$(cat /etc/valkey/password)"{{ end }} ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  valkey-cli -p "$(cat /tmp/valkey-port)" {{ if .Values.auth.enabled }}-a "$(cat /etc/valkey/password)"{{ end }} ping | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /data}
            - {name: config, mountPath: /etc/valkey/valkey.conf, subPath: valkey.conf}
            {{- if .Values.auth.enabled }}
            - {name: password, mountPath: /etc/valkey/password, subPath: password}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: valkey
            items: [{key: valkey.conf, path: valkey.conf}]
        {{- if .Values.auth.enabled }}
        - name: password
          secret:
            secretName: valkey
            items: [{key: password, path: password}]
        {{- end }}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- with .Values.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
