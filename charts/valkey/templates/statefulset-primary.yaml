apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-primary
  labels: {{- include "valkey.labels" . | nindent 4 }}
spec:
  serviceName: valkey-primary-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel    # all primaries can start together; we don't need ordered boot
  selector:
    matchLabels: {{- include "valkey.primarySelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey.primarySelector" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -oE '[0-9]+$')
              # TWO planes, deliberately split:
              #  - GOSSIP (node↔node): announce the POD IP + container bus port.
              #    Pods reach each other's bus directly on the CNI network — no
              #    VIP, no hairpin. Re-announced from $POD_IP on every (re)start.
              #  - CLIENT (what MOVED/CLUSTER SHARDS hand out): announce the
              #    per-pod external PORT; the HOSTNAME + preferred-endpoint-type
              #    come from valkey.conf (same for all pods). Clients resolve the
              #    hostname → VIP and dial that port; klipper routes to this pod.
              ANNOUNCE_IP="$POD_IP"
              ANNOUNCE_BUS_PORT={{ .Values.ports.bus }}
              {{- if .Values.loadBalancer.enabled }}
              IDX=$((ORDINAL + ORDINAL_OFFSET))
              ANNOUNCE_PORT=$((BASE_CLIENT_PORT + IDX))    # external client port via VIP
              {{- else }}
              ANNOUNCE_PORT={{ .Values.ports.client }}
              {{- end }}
              echo "valkey-primary-${ORDINAL}: gossip ${ANNOUNCE_IP}:${ANNOUNCE_BUS_PORT}, client port ${ANNOUNCE_PORT}"
              exec valkey-server /etc/valkey/valkey.conf \
                --cluster-announce-ip "$ANNOUNCE_IP" \
                --cluster-announce-port "$ANNOUNCE_PORT" \
                --cluster-announce-bus-port "$ANNOUNCE_BUS_PORT"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .Values.loadBalancer.enabled }}
            - name: BASE_CLIENT_PORT
              value: {{ .Values.loadBalancer.basePorts.client | quote }}
            - name: ORDINAL_OFFSET
              value: "0"      # primaries occupy idx 0..replicaCount-1
            {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
            - name: bus
              containerPort: {{ .Values.ports.bus }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  valkey-cli {{ if .Values.auth.enabled }}-a "$(cat /etc/valkey/password)"{{ end }} ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: {port: client}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /data}
            - {name: config, mountPath: /etc/valkey/valkey.conf, subPath: valkey.conf}
            {{- if .Values.auth.enabled }}
            - {name: password, mountPath: /etc/valkey/password, subPath: password}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: valkey
            items: [{key: valkey.conf, path: valkey.conf}]
        {{- if .Values.auth.enabled }}
        - name: password
          secret:
            secretName: valkey
            items: [{key: password, path: password}]
        {{- end }}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- with .Values.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
