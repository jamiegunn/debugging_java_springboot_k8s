apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-bootstrap
  labels: {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    # Idempotent: skips work if cluster_state is already "ok". Re-runs on every
    # upgrade so scale-ups or topology changes get picked up.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: {{- include "valkey.allSelector" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- if .Values.auth.enabled }}
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef: {name: valkey, key: password}
          {{- end }}
          command:
            - sh
            - -c
            - |
              set -eu
              {{- if .Values.auth.enabled }}
              AUTH="-a $VALKEY_PASSWORD"
              {{- else }}
              AUTH=""
              {{- end }}
              # Each pod listens on a UNIQUE port (base+idx) so gossip can be
              # direct pod-to-pod. So every valkey-cli here must target the right
              # per-ordinal port, and --cluster create/add-node use host:port.
              {{- if .Values.loadBalancer.enabled }}
              BASE={{ .Values.loadBalancer.basePorts.client }}; UNIQUE=1
              {{- else }}
              BASE={{ .Values.ports.client }}; UNIQUE=0
              {{- end }}
              N={{ .Values.replicaCount }}
              port_for() { if [ "$UNIQUE" = 1 ]; then echo $((BASE + $1)); else echo $BASE; fi; }

              PRIMARY_EPS=""; SECONDARY_EPS=""
              i=0; while [ $i -lt $N ]; do
                PRIMARY_EPS="$PRIMARY_EPS valkey-primary-$i.valkey-primary-headless:$(port_for $i)"
                SECONDARY_EPS="$SECONDARY_EPS valkey-secondary-$i.valkey-secondary-headless:$(port_for $((N+i)))"
                i=$((i+1))
              done
              ALL_EPS="$PRIMARY_EPS $SECONDARY_EPS"
              SEED_H="valkey-primary-0.valkey-primary-headless"; SEED_P="$(port_for 0)"
              cli() { h="$1"; p="$2"; shift 2; valkey-cli -h "$h" -p "$p" $AUTH "$@"; }   # cli <host> <port> <cmd...>

              echo "Waiting for all nodes to PING..."
              for ep in $ALL_EPS; do
                h="${ep%:*}"; p="${ep##*:}"
                for i in $(seq 1 60); do
                  if cli "$h" "$p" ping 2>/dev/null | grep -q PONG; then echo "  $ep OK"; break; fi
                  sleep 5
                done
              done

              # Already fully healthy? Need cluster_state ok AND all 2N nodes known
              # (a bare 3-primary cluster is also 'ok', so don't early-exit on that).
              INFO="$(cli "$SEED_H" "$SEED_P" cluster info)"
              STATE="$(echo "$INFO" | awk -F: '/cluster_state/ {print $2}' | tr -d '\r\n ')"
              KNOWN="$(echo "$INFO" | awk -F: '/cluster_known_nodes/ {print $2}' | tr -d '\r\n ')"
              if [ "$STATE" = "ok" ] && [ "$KNOWN" = "$((N*2))" ]; then
                echo "Cluster already healthy ($KNOWN nodes). Nothing to do."; exit 0
              fi

              # Stale PVC state (dead peers from a prior install) → hard reset all.
              STALE=0
              for ep in $ALL_EPS; do
                h="${ep%:*}"; p="${ep##*:}"
                if cli "$h" "$p" cluster nodes 2>/dev/null | grep -qE '(disconnected|handshake|noaddr)'; then STALE=1; break; fi
                n_peers=$(cli "$h" "$p" cluster nodes 2>/dev/null | wc -l)
                if [ "$n_peers" -gt 1 ]; then STALE=1; break; fi
              done
              if [ "$STALE" -eq 1 ]; then
                echo "Detected stale cluster state; hard-resetting every node..."
                for ep in $ALL_EPS; do
                  h="${ep%:*}"; p="${ep##*:}"
                  cli "$h" "$p" cluster reset hard 2>/dev/null || true
                  cli "$h" "$p" flushall 2>/dev/null || true
                done
                sleep 3
              fi

              echo "Creating cluster on primaries (no replicas yet)..."
              echo yes | valkey-cli $AUTH --cluster create $PRIMARY_EPS --cluster-replicas 0

              echo "Attaching each secondary to its by-index primary..."
              i=0; while [ $i -lt $N ]; do
                PEP="valkey-primary-$i.valkey-primary-headless:$(port_for $i)"
                SEP="valkey-secondary-$i.valkey-secondary-headless:$(port_for $((N+i)))"
                PID="$(cli "valkey-primary-$i.valkey-primary-headless" "$(port_for $i)" cluster myid | tr -d '\r\n ')"
                echo "  secondary-$i → primary-$i (id=$PID)"
                valkey-cli $AUTH --cluster add-node "$SEP" "$PEP" --cluster-slave --cluster-master-id "$PID"
                i=$((i+1))
              done

              echo "Final cluster check:"
              cli "$SEED_H" "$SEED_P" cluster info
              cli "$SEED_H" "$SEED_P" cluster nodes
