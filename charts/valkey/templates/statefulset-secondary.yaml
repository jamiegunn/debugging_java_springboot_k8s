apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-secondary
  labels: {{- include "valkey.labels" . | nindent 4 }}
spec:
  serviceName: valkey-secondary-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels: {{- include "valkey.secondarySelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey.secondarySelector" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -oE '[0-9]+$')
              # See statefulset-primary.yaml. Announce the shared VIP + this
              # pod's unique ports; klipper remaps to the pod. Secondaries occupy
              # idx replicaCount..2*replicaCount-1.
              {{- if .Values.loadBalancer.enabled }}
              IDX=$((ORDINAL + ORDINAL_OFFSET))
              ANNOUNCE_IP="$ANNOUNCE_VIP"
              ANNOUNCE_PORT=$((BASE_CLIENT_PORT + IDX))
              ANNOUNCE_BUS_PORT=$((BASE_BUS_PORT + IDX))
              {{- else }}
              ANNOUNCE_IP="$POD_IP"
              ANNOUNCE_PORT={{ .Values.ports.client }}
              ANNOUNCE_BUS_PORT={{ .Values.ports.bus }}
              {{- end }}
              echo "valkey-secondary-${ORDINAL}: announce ${ANNOUNCE_IP}:${ANNOUNCE_PORT} (bus ${ANNOUNCE_BUS_PORT})"
              exec valkey-server /etc/valkey/valkey.conf \
                --cluster-announce-ip "$ANNOUNCE_IP" \
                --cluster-announce-port "$ANNOUNCE_PORT" \
                --cluster-announce-bus-port "$ANNOUNCE_BUS_PORT"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .Values.loadBalancer.enabled }}
            - name: ANNOUNCE_VIP
              value: {{ .Values.loadBalancer.announceIP | quote }}
            - name: BASE_CLIENT_PORT
              value: {{ .Values.loadBalancer.basePorts.client | quote }}
            - name: BASE_BUS_PORT
              value: {{ .Values.loadBalancer.basePorts.bus | quote }}
            - name: ORDINAL_OFFSET
              value: {{ .Values.replicaCount | quote }}   # secondaries follow the primaries
            {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
            - name: bus
              containerPort: {{ .Values.ports.bus }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  valkey-cli {{ if .Values.auth.enabled }}-a "$(cat /etc/valkey/password)"{{ end }} ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: {port: client}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /data}
            - {name: config, mountPath: /etc/valkey/valkey.conf, subPath: valkey.conf}
            {{- if .Values.auth.enabled }}
            - {name: password, mountPath: /etc/valkey/password, subPath: password}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: valkey
            items: [{key: valkey.conf, path: valkey.conf}]
        {{- if .Values.auth.enabled }}
        - name: password
          secret:
            secretName: valkey
            items: [{key: password, path: password}]
        {{- end }}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- with .Values.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
