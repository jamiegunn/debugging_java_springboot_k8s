{{- if .Values.loadBalancer.enabled }}
{{- /*
  Per-pod LoadBalancer Services, port-separated. One Service per Valkey pod,
  each selecting that single pod by name via the StatefulSet's injected
  `statefulset.kubernetes.io/pod-name` label, exposing a UNIQUE client port
  (basePorts.client + idx, idx counts primaries 0..n-1 then secondaries n..2n-1).

  On k3s these are fulfilled by klipper (servicelb): it hostPort-binds each
  Service's port on every node and forwards to the pod. keepalived floats one
  VIP across the nodes, and dnsmasq resolves valkey.debug-demo.local → that VIP.
  So a client dials valkey.debug-demo.local:6380 → VIP → klipper(:6380) → the
  primary-1 pod. Per-shard addressability comes from the PORT; the address is a
  hostname → VIP (no MetalLB, no per-pod IPs, no allow-shared-ip).

  Both the CLIENT and BUS ports are exposed. The cluster bus (gossip) and
  intra-cluster client connections dial announceIP:port = VIP:port; klipper
  forwards VIP:6380 → pod:6379 (client) and VIP:16380 → pod:16379 (bus). Pods
  reach the VIP directly on k3s (shared L2), so this needs no shim.
*/}}
{{- $cbase := int .Values.loadBalancer.basePorts.client }}
{{- $bbase := int .Values.loadBalancer.basePorts.bus }}
{{- $n := int .Values.replicaCount }}
{{- range $i := until $n }}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-primary-{{ $i }}-ext
  labels: {{- include "valkey.labels" $ | nindent 4 }}
    valkey.role: primary
spec:
  type: LoadBalancer
  ports:
    - {name: client, port: {{ add $cbase $i }}, targetPort: client}
    - {name: bus,    port: {{ add $bbase $i }}, targetPort: bus}
  selector:
    statefulset.kubernetes.io/pod-name: valkey-primary-{{ $i }}
{{- end }}
{{- range $i := until $n }}
{{- $idx := add $i $n }}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-secondary-{{ $i }}-ext
  labels: {{- include "valkey.labels" $ | nindent 4 }}
    valkey.role: secondary
spec:
  type: LoadBalancer
  ports:
    - {name: client, port: {{ add $cbase $idx }}, targetPort: client}
    - {name: bus,    port: {{ add $bbase $idx }}, targetPort: bus}
  selector:
    statefulset.kubernetes.io/pod-name: valkey-secondary-{{ $i }}
{{- end }}
{{- end }}
