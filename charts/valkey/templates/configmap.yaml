apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey
  labels: {{- include "valkey.labels" . | nindent 4 }}
data:
  valkey.conf: |
    # Network. `port` and `cluster-port` are NOT set here — each pod listens on
    # its own unique port, so the entrypoint passes --port / --cluster-port.
    bind 0.0.0.0
    protected-mode no

    # Cluster mode. cluster-announce-{ip,port,bus-port} are per-pod CLI flags
    # (each pod announces its POD IP + unique ports, so gossip is direct
    # pod-to-pod). The HOSTNAME + endpoint preference are the SAME for every pod:
    #   - cluster-announce-hostname: the name CLUSTER SHARDS/NODES/MOVED hand to
    #     clients (resolves to the keepalived VIP via dnsmasq/CoreDNS).
    #   - cluster-preferred-endpoint-type hostname: return that hostname (with
    #     the per-pod announced port) instead of an IP.
    cluster-enabled yes
    cluster-config-file /data/nodes.conf
    cluster-node-timeout 5000
    {{- if .Values.loadBalancer.enabled }}
    cluster-announce-hostname {{ .Values.loadBalancer.announceHostname }}
    cluster-preferred-endpoint-type hostname
    {{- end }}

    # Persistence — AOF is mandatory for cluster mode if you want durability
    appendonly yes
    dir /data

    {{- if .Values.auth.enabled }}
    requirepass {{ .Values.auth.password | quote }}
    masterauth {{ .Values.auth.password | quote }}
    {{- end }}

    {{ .Values.config.extra | nindent 4 }}
