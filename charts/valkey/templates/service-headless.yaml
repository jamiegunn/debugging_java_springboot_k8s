apiVersion: v1
kind: Service
metadata:
  name: valkey-primary-headless
  labels: {{- include "valkey.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true   # so cluster gossip can find peers during bootstrap
  ports:
    # Headless (clusterIP None) — DNS only; connections go straight to pod IP on
    # whatever port the client names, so these are cosmetic. Pods listen on
    # per-ordinal ports; the bootstrap Job and clients use those.
    - {name: client, port: {{ .Values.ports.client }}, targetPort: {{ .Values.ports.client }}}
    - {name: bus,    port: {{ .Values.ports.bus }},    targetPort: {{ .Values.ports.bus }}}
  selector: {{- include "valkey.primarySelector" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-secondary-headless
  labels: {{- include "valkey.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    # Headless (clusterIP None) — DNS only; connections go straight to pod IP on
    # whatever port the client names, so these are cosmetic. Pods listen on
    # per-ordinal ports; the bootstrap Job and clients use those.
    - {name: client, port: {{ .Values.ports.client }}, targetPort: {{ .Values.ports.client }}}
    - {name: bus,    port: {{ .Values.ports.bus }},    targetPort: {{ .Values.ports.bus }}}
  selector: {{- include "valkey.secondarySelector" . | nindent 4 }}
