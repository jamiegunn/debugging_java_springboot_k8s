image:
  repository: container-registry.oracle.com/database/free
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Pin this single-replica StatefulSet to a node by hostname (empty = scheduler
# chooses). Set e.g. lima-ddk3s-agent-2 for deterministic node-kill tests.
pinToNode: ""

service:
  port: 1521

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi

storage:
  size: 10Gi
  storageClassName: ""

oracle:
  sid: FREE
  pdb: FREEPDB1
  sysPassword: oracle
  appUser: appuser
  appPassword: appuser
  characterSet: AL32UTF8
