apiVersion: v1
kind: Secret
metadata:
  name: {{ include "artifactory.fullname" . }}-postgres
  labels: {{- include "artifactory.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "artifactory.fullname" . }}-postgres
  labels: {{- include "artifactory.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "artifactory.fullname" . }}-postgres
  labels: {{- include "artifactory.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "artifactory.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - name: pg
              containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ include "artifactory.fullname" . }}-postgres
          env:
            # PGDATA must live in a subdir of the mount, otherwise postgres
            # refuses to init because of lost+found.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.username }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.username }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
