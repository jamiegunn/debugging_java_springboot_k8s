apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "artifactory.fullname" . }}-init-repos
  labels: {{- include "artifactory.labels" . | nindent 4 }}
  annotations:
    # Re-run on every helm upgrade so chart changes to repo names take effect.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: {{- include "artifactory.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: curlimages/curl:8.10.1
          command: ["sh", "/scripts/init.sh"]
          env:
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifactory.fullname" . }}
                  key: ADMIN_USER
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifactory.fullname" . }}
                  key: ADMIN_PASSWORD
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "artifactory.fullname" . }}-init-repos
