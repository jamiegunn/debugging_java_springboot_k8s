{{- if .Values.externalService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "debug-demo-app.fullname" . }}-ext
  labels: {{- include "debug-demo-app.labels" . | nindent 4 }}
  annotations:
    metallb.universe.tf/address-pool: {{ .Values.externalService.pool | quote }}
spec:
  type: LoadBalancer
  loadBalancerIP: {{ .Values.externalService.loadBalancerIP | quote }}
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: {{ .Values.externalService.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "debug-demo-app.selectorLabels" . | nindent 4 }}
{{- end }}
