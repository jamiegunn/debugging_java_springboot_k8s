apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "debug-demo-app.fullname" . }}
  labels: {{- include "debug-demo-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "debug-demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "debug-demo-app.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "debug-demo-app.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: true
      {{- if .Values.affinity }}
      affinity: {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if .Values.spreadAcrossNodes }}
      # Spread replicas across worker nodes so one node loss ≠ full outage.
      # (The control-plane node is tainted, so this only ever spreads across
      # the agents.) Preferred, not required, so it still schedules on a
      # single-worker cluster.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "debug-demo-app.selectorLabels" . | nindent 20 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      # Pin external-style hostnames to the VIP in /etc/hosts. Lettuce/netty's
      # own DNS resolver mishandles Kubernetes ndots:5 search-domain expansion
      # for names like valkey.debug-demo.local (getent resolves them, netty
      # doesn't), so map them here — /etc/hosts is consulted before DNS.
      hostAliases: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "debug-demo-app.fullname" . }}-config
          env:
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.oraclePasswordSecret" . }}
                  key: ORACLE_PASSWORD
            - name: MQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.mqPasswordSecret" . }}
                  key: MQ_PASSWORD
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.valkeyPasswordSecret" . }}
                  key: VALKEY_PASSWORD
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: heapdumps
              mountPath: /tmp/heapdumps
      volumes:
        - name: heapdumps
          emptyDir: {}
