apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "debug-demo-app.fullname" . }}
  labels: {{- include "debug-demo-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "debug-demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "debug-demo-app.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "debug-demo-app.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: true
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "debug-demo-app.fullname" . }}-config
          env:
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.oraclePasswordSecret" . }}
                  key: ORACLE_PASSWORD
            - name: MQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.mqPasswordSecret" . }}
                  key: MQ_PASSWORD
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "debug-demo-app.valkeyPasswordSecret" . }}
                  key: VALKEY_PASSWORD
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: heapdumps
              mountPath: /tmp/heapdumps
      volumes:
        - name: heapdumps
          emptyDir: {}
