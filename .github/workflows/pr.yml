name: PR validation

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit + integration tests
        working-directory: app
        run: mvn -B verify

      - name: Helm lint
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - run: |
          helm lint charts/debug-demo-app
          helm lint charts/oracle
          helm lint charts/ibm-mq

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
