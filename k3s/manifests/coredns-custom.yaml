apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  debug-demo.server: |
    __BASE_DOMAIN__:53 {
        errors
        template IN A {
            answer "{{ .Name }} 60 IN A __K3S_VIP__"
        }
        template IN AAAA {
            rcode NXDOMAIN
        }
    }