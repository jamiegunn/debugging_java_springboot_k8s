# Lima template for a k3s node (server or agent). Parameterized by env vars
# passed on the limactl command line: CPUS, MEMORY, DISK. Attached to Lima's
# `shared` network (socket_vmnet) so the VM, its peers, the keepalived VIP, and
# the Mac all sit on one L2 segment (192.168.105.0/24) — no NAT, no routes.
#
# Deliberately minimal + OFFLINE-friendly: Alpine base (small, fast), no
# containerd/k3s provisioning here — k3s-cluster.sh installs k3s from the
# air-gap bundle after boot. The only provisioning is the host packages k3s and
# our VIP/DNS layer need (keepalived, dnsmasq, curl), which on a truly
# air-gapped host would come from a local apk mirror; see k3s-cluster.sh notes.

vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true   # lets amd64-only images (IBM MQ) run on Apple Silicon
      binfmt: true

images:
  - location: "https://github.com/lima-vm/alpine-lima/releases/download/v1.1.0/alpine-lima-std-3.21.0-aarch64.iso"
    arch: "aarch64"
  - location: "https://github.com/lima-vm/alpine-lima/releases/download/v1.1.0/alpine-lima-std-3.21.0-x86_64.iso"
    arch: "x86_64"

# cpus / memory / disk are set per-VM via `limactl create --cpus/--memory/--disk`.

networks:
  - lima: shared    # socket_vmnet shared net → 192.168.105.0/24

mountType: "virtiofs"
mounts: []          # air-gapped: no host mounts needed; bundle is copied in

containerd:
  system: false
  user: false       # k3s brings its own containerd

# Host packages k3s + keepalived + dnsmasq need. On an internet-connected Mac
# this apk runs at first boot; on a fully air-gapped host, pre-seed a local apk
# repo (or bake a custom image) — k3s-cluster.sh detects a missing package and
# tells you which. keepalived/dnsmasq are only STARTED on the nodes that need
# them (all/server); installing everywhere keeps the image uniform.
provision:
  - mode: system
    script: |
      #!/bin/sh
      set -e
      # Kernel bits k3s needs; harmless if already present.
      modprobe br_netfilter 2>/dev/null || true
      modprobe overlay 2>/dev/null || true
      cat > /etc/sysctl.d/90-k3s.conf <<'EOF'
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
      net.ipv4.conf.all.arp_ignore = 0
      net.ipv4.conf.all.arp_announce = 0
      EOF
      sysctl -p /etc/sysctl.d/90-k3s.conf 2>/dev/null || true
      # keepalived needs to bind the VIP that isn't a local iface address.
      echo 'net.ipv4.ip_nonlocal_bind = 1' >> /etc/sysctl.d/90-k3s.conf
      sysctl -w net.ipv4.ip_nonlocal_bind=1 2>/dev/null || true
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache keepalived dnsmasq curl iproute2 2>/dev/null || \
          echo "WARN: apk add failed (air-gapped without a local mirror?) — install keepalived/dnsmasq/curl by hand" >&2
      fi
